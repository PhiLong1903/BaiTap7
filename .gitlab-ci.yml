name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build
        run: |
          echo "🏗️ Building the project..."
          echo "Build completed at: $(date)"
          echo "Build Status: ✅ Success"

  test:
    runs-on: ubuntu-latest
    name: Test
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          echo "Checking HTML syntax..."
          test -f public/index.html && echo "✓ index.html exists" || exit 1
          test -f public/styles.css && echo "✓ styles.css exists" || exit 1
          test -f public/js/main.js && echo "✓ main.js exists" || exit 1
          echo "Test Status: ✅ All tests passed"

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    if: github.event_name == 'workflow_dispatch'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

      - name: Deployment complete
        run: |
          echo "🚀 Deployed to GitHub Pages successfully!"
          echo "Site URL: ${{ steps.deployment.outputs.page_url }}"